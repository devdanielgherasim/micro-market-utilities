name: Cosign GitHub identity
description: >
  Derives the expected Fulcio certificate identity + OIDC issuer for cosign
  keyless sign/verify on GitHub Actions, for a specific workflow file and ref.
  Both the sign step and the verify step must call this action and use its
  outputs, rather than inlining the identity string twice, so the two can
  never drift apart (replaces the single hard-coded GitLab-format identity
  string previously shared implicitly between cosign-sign/cosign-verify in
  ci-templates/image-supply-chain.gitlab-ci.yml).

inputs:
  workflow-repo:
    description: >
      GitHub owner/repo that hosts the reusable workflow which performed the
      signing. For reusable (called) workflows the Fulcio certificate SAN
      always references the *reusable* workflow's repo, not the caller's.
    required: true
  workflow-file:
    description: Workflow filename that performed the signing, e.g. image-supply-chain.yml
    required: true
  ref:
    description: Git ref the signing workflow ran on
    required: false
    default: refs/heads/main

outputs:
  identity:
    value: ${{ steps.derive.outputs.identity }}
  issuer:
    value: ${{ steps.derive.outputs.issuer }}

runs:
  using: composite
  steps:
    - id: derive
      shell: bash
      env:
        REPOSITORY: ${{ inputs.workflow-repo }}
        WORKFLOW_FILE: ${{ inputs.workflow-file }}
        REF: ${{ inputs.ref }}
      run: |
        set -eu
        {
          echo "identity=https://github.com/${REPOSITORY}/.github/workflows/${WORKFLOW_FILE}@${REF}"
          echo "issuer=https://token.actions.githubusercontent.com"
        } >> "${GITHUB_OUTPUT}"
