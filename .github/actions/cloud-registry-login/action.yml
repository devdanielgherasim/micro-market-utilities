name: Cloud registry login
description: >
  OIDC-based docker login to the active cloud's container registry (AWS ECR /
  Azure ACR / GCP Artifact Registry). Replaces GitLab's .registry-login /
  .supply-chain-base before_script (ci-templates/image-supply-chain.gitlab-ci.yml),
  using the standard cloud auth actions instead of hand-rolled OIDC token
  exchange. Requires the caller job to declare `permissions: id-token: write`.

inputs:
  cloud-provider:
    description: aws | azure | gcp
    required: true
  container-registry-name:
    description: Registry host. For AWS this may be omitted and will be derived from STS caller identity.
    required: false
  aws-role-arn:
    required: false
  aws-region:
    required: false
    default: eu-central-1
  azure-client-id:
    required: false
  azure-tenant-id:
    required: false
  azure-subscription-id:
    required: false
  project-namespace:
    description: Used to self-derive the ACR name (acr<namespace><environment>.azurecr.io) when container-registry-name is omitted. Required for Azure if container-registry-name isn't set.
    required: false
  environment:
    description: dev | staging | prod. Used with project-namespace to self-derive the ACR name for Azure.
    required: false
  gcp-workload-identity-provider:
    required: false
  gcp-service-account-email:
    required: false
  gcp-region:
    required: false
    default: europe-west3

outputs:
  container-registry-name:
    description: Resolved registry host used for docker login.
    value: ${{ steps.aws-login.outputs.container-registry-name || steps.azure-login.outputs.container-registry-name || steps.gcp-login.outputs.container-registry-name }}

runs:
  using: composite
  steps:
    - if: ${{ inputs.cloud-provider == 'aws' }}
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - if: ${{ inputs.cloud-provider == 'aws' }}
      id: aws-login
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        REGISTRY: ${{ inputs.container-registry-name }}
      run: |
        set -eu
        if [ -z "${REGISTRY:-}" ]; then
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
        fi
        aws ecr get-login-password --region "${AWS_REGION}" \
          | docker login --username AWS --password-stdin "${REGISTRY}"
        echo "container-registry-name=${REGISTRY}" >> "${GITHUB_OUTPUT}"

    - if: ${{ inputs.cloud-provider == 'azure' }}
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - if: ${{ inputs.cloud-provider == 'azure' }}
      id: azure-login
      shell: bash
      env:
        REGISTRY: ${{ inputs.container-registry-name }}
        PROJECT_NAMESPACE: ${{ inputs.project-namespace }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -eu
        if [ -z "${REGISTRY:-}" ]; then
          : "${PROJECT_NAMESPACE:?container-registry-name or project-namespace is required for Azure registry login}"
          : "${ENVIRONMENT:?container-registry-name or environment is required for Azure registry login}"
          azure_acr_project="$(printf '%s' "${PROJECT_NAMESPACE}" | tr -d '-')"
          REGISTRY="acr${azure_acr_project}${ENVIRONMENT}.azurecr.io"
        fi
        acr_name="$(echo "${REGISTRY}" | sed 's/\.azurecr\.io$//')"
        az acr login --name "${acr_name}"
        echo "container-registry-name=${REGISTRY}" >> "${GITHUB_OUTPUT}"

    - if: ${{ inputs.cloud-provider == 'gcp' }}
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account-email }}

    - if: ${{ inputs.cloud-provider == 'gcp' }}
      uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

    - if: ${{ inputs.cloud-provider == 'gcp' }}
      id: gcp-login
      shell: bash
      env:
        GCP_REGION: ${{ inputs.gcp-region }}
        REGISTRY: ${{ inputs.container-registry-name }}
      run: |
        set -eu
        gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
        echo "container-registry-name=${REGISTRY}" >> "${GITHUB_OUTPUT}"
