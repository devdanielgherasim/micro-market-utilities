name: Resolve image reference
description: >
  Recomputes the pushed image ref/digest using the same per-cloud formula as
  each service's build.sh, and exposes them as step outputs. Replaces GitLab's
  .export-image-ref (ci-templates/image-supply-chain.gitlab-ci.yml) — instead
  of writing a dotenv artifact, it sets step outputs consumed via
  needs.<job>.outputs.* by later jobs in the same workflow run.

inputs:
  cloud-provider:
    description: aws | azure | gcp
    required: true
  environment:
    description: dev | staging | prod
    required: true
  project-namespace:
    required: true
  aws-account-id:
    required: false
  aws-region:
    required: false
    default: eu-central-1
  gcp-project-id:
    required: false
  gcp-region:
    required: false
    default: europe-west3
  container-registry-name:
    description: Override the computed registry host (rarely needed).
    required: false
  image-name:
    description: Override the image name; defaults to the GitHub repository name.
    required: false

outputs:
  container-registry-name:
    description: Registry host, e.g. <acct>.dkr.ecr.<region>.amazonaws.com
    value: ${{ steps.resolve.outputs.container-registry-name }}
  image-repository:
    description: <registry>/<group>/<name> (repo ref, no tag)
    value: ${{ steps.resolve.outputs.image-repository }}
  image-ref:
    description: <registry>/<group>/<name>:<sha> (tag ref)
    value: ${{ steps.resolve.outputs.image-ref }}
  image-digest:
    description: <registry>/<group>/<name>@sha256:<...> (canonical, falls back to image-ref if unresolvable)
    value: ${{ steps.resolve.outputs.image-digest }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        CLOUD_PROVIDER: ${{ inputs.cloud-provider }}
        ENVIRONMENT: ${{ inputs.environment }}
        PROJECT_NAMESPACE: ${{ inputs.project-namespace }}
        AWS_ACCOUNT_ID: ${{ inputs.aws-account-id }}
        AWS_REGION: ${{ inputs.aws-region }}
        GCP_PROJECT_ID: ${{ inputs.gcp-project-id }}
        GCP_REGION: ${{ inputs.gcp-region }}
        CONTAINER_REGISTRY_NAME: ${{ inputs.container-registry-name }}
        REPO_NAME: ${{ github.event.repository.name }}
        IMAGE_NAME: ${{ inputs.image-name }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        set -eu
        : "${CLOUD_PROVIDER:?}" "${ENVIRONMENT:?}" "${PROJECT_NAMESPACE:?}"
        : "${REPO_NAME:?}" "${COMMIT_SHA:?}"
        IMAGE_NAME="${IMAGE_NAME:-${REPO_NAME}}"

        if [ -z "${CONTAINER_REGISTRY_NAME:-}" ]; then
          case "${CLOUD_PROVIDER}" in
            aws)
              : "${AWS_ACCOUNT_ID:?}"; AWS_REGION="${AWS_REGION:-eu-central-1}"
              CONTAINER_REGISTRY_NAME="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" ;;
            azure)
              AZURE_ACR_PROJECT="$(printf '%s' "${PROJECT_NAMESPACE}" | tr -d '-')"
              CONTAINER_REGISTRY_NAME="acr${AZURE_ACR_PROJECT}${ENVIRONMENT}.azurecr.io" ;;
            gcp)
              : "${GCP_PROJECT_ID:?}"; GCP_REGION="${GCP_REGION:-europe-west3}"
              CONTAINER_REGISTRY_NAME="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}" ;;
            *) echo "Unsupported CLOUD_PROVIDER '${CLOUD_PROVIDER}'" >&2; exit 1 ;;
          esac
        fi

        case "${CLOUD_PROVIDER}" in
          aws)   IMAGE_GROUP="${PROJECT_NAMESPACE}/${ENVIRONMENT}" ;;
          azure) IMAGE_GROUP="${PROJECT_NAMESPACE}" ;;
          gcp)   IMAGE_GROUP="${PROJECT_NAMESPACE}-${ENVIRONMENT}" ;;
        esac

        IMAGE_REPOSITORY="${CONTAINER_REGISTRY_NAME}/${IMAGE_GROUP}/${IMAGE_NAME}"
        IMAGE_REF="${IMAGE_REPOSITORY}:${COMMIT_SHA}"

        IMAGE_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_REF}" 2>/dev/null || true)"
        if [ -z "${IMAGE_DIGEST}" ]; then
          echo "WARNING: could not resolve pushed digest; downstream jobs will use the tag ref." >&2
          IMAGE_DIGEST="${IMAGE_REF}"
        fi

        {
          echo "container-registry-name=${CONTAINER_REGISTRY_NAME}"
          echo "image-repository=${IMAGE_REPOSITORY}"
          echo "image-ref=${IMAGE_REF}"
          echo "image-digest=${IMAGE_DIGEST}"
        } >> "${GITHUB_OUTPUT}"

        echo "===== Supply-chain image reference ====="
        echo "container-registry-name=${CONTAINER_REGISTRY_NAME}"
        echo "image-repository=${IMAGE_REPOSITORY}"
        echo "image-ref=${IMAGE_REF}"
        echo "image-digest=${IMAGE_DIGEST}"
