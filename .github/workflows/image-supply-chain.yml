# =============================================================================
# image-supply-chain.yml (reusable workflow)
# -----------------------------------------------------------------------------
# GitHub Actions replacement for ci-templates/image-supply-chain.gitlab-ci.yml.
# Scans, SBOMs, keyless-signs and verifies an image a caller job already built
# and pushed, then hands the promoted tag to the `deployment` repo via
# repository_dispatch.
#
# Cross-references to this repo's own composite actions below are hardcoded
# to devdanielgherasim/micro-market-utilities@main (`uses:` cannot take an
# expression, so this can't be parameterized at runtime). Update both if the
# org or repo is ever renamed.
#
# Caller contract: the caller job must run BEFORE invoking this workflow:
#   1. cloud-registry-login + the actual image build/push
#   2. utilities/.github/actions/resolve-image-ref, and pass its outputs in
#      via `with:` (image-repository/image-ref/image-digest/container-registry-name)
# =============================================================================

on:
  workflow_call:
    inputs:
      cloud-provider:
        type: string
        required: true
      container-registry-name:
        type: string
        required: true
      image-repository:
        type: string
        required: true
      image-ref:
        type: string
        required: true
      image-digest:
        type: string
        required: true
      aws-region:
        type: string
        default: eu-central-1
      gcp-region:
        type: string
        default: europe-west3
      deployment-repo:
        description: "owner/repo of the deployment repo, e.g. my-org/deployment"
        type: string
        required: true
      promoted-app:
        description: App/chart name to send to the deployment repo; defaults to the caller repository name.
        type: string
        default: ""
      trivy-severity:
        type: string
        default: "HIGH,CRITICAL"
      trivy-ignore-cves:
        description: >-
          Verbatim .trivyignore file contents (CVE IDs, one per line, '#' comments
          allowed) to exempt from the HIGH/CRITICAL gate below. Leave empty (default)
          to enforce strictly with no exceptions -- only set this for a documented,
          reviewed, lab-scope risk acceptance (e.g. an unfixed CVE in an upstream
          base image that isn't reachable in this container's runtime context).
        type: string
        default: ""
      trigger-promotion:
        description: Set false to shadow-run this workflow without firing the deployment dispatch
        type: boolean
        default: true
    secrets:
      AWS_ROLE_ARN:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT_EMAIL:
        required: false
      DEPLOYMENT_DISPATCH_PAT:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # trivy-scan: fail the pipeline on any HIGH/CRITICAL vulnerability in the
  # pushed image. Same severity list as security-scan-gate.yml so the
  # image-level gate is no weaker than the app-level gate it sits alongside.
  # ---------------------------------------------------------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Cloud registry login
        uses: devdanielgherasim/micro-market-utilities/.github/actions/cloud-registry-login@main
        with:
          cloud-provider: ${{ inputs.cloud-provider }}
          container-registry-name: ${{ inputs.container-registry-name }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          gcp-region: ${{ inputs.gcp-region }}

      - name: Log resolved image reference
        env:
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          IMAGE_REF: ${{ inputs.image-ref }}
        run: echo "Scanning digest ${IMAGE_DIGEST} (tag ref ${IMAGE_REF})"
        shell: bash

      # No checkout in this job (it scans an already-pushed image by digest, not
      # repo source), so a caller-supplied ignore list is written here rather than
      # read from a committed .trivyignore file.
      - name: Write trivy ignore list
        if: ${{ inputs.trivy-ignore-cves != '' }}
        env:
          TRIVY_IGNORE_CVES: ${{ inputs.trivy-ignore-cves }}
        run: printf '%s\n' "${TRIVY_IGNORE_CVES}" > .trivyignore
        shell: bash

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image-digest }}
          format: table
          severity: ${{ inputs.trivy-severity }}
          exit-code: "1"
          timeout: 15m0s
          trivyignores: ${{ inputs.trivy-ignore-cves != '' && '.trivyignore' || '' }}

  # ---------------------------------------------------------------------------
  # sbom-generate: produce a CycloneDX SBOM, kept as a workflow artifact for
  # cosign-sign to attest.
  # ---------------------------------------------------------------------------
  sbom-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Cloud registry login
        uses: devdanielgherasim/micro-market-utilities/.github/actions/cloud-registry-login@main
        with:
          cloud-provider: ${{ inputs.cloud-provider }}
          container-registry-name: ${{ inputs.container-registry-name }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          gcp-region: ${{ inputs.gcp-region }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ inputs.image-digest }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: SBOM component count
        run: 'echo "SBOM component count: $(jq ''.components | length'' sbom.json)"'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.repository.name }}-${{ github.sha }}
          path: sbom.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # cosign-sign: keyless-sign the image and attest the SBOM. Uses GitHub
  # Actions' native OIDC support (cosign auto-detects ACTIONS_ID_TOKEN_REQUEST_*
  # given `permissions: id-token: write` — no separate identity-token flag or
  # second-audience token needed, unlike GitLab's split
  # GITLAB_OIDC_TOKEN/SIGSTORE_ID_TOKEN).
  # ---------------------------------------------------------------------------
  cosign-sign:
    runs-on: ubuntu-latest
    needs: [trivy-scan, sbom-generate]
    steps:
      - name: Cloud registry login
        uses: devdanielgherasim/micro-market-utilities/.github/actions/cloud-registry-login@main
        with:
          cloud-provider: ${{ inputs.cloud-provider }}
          container-registry-name: ${{ inputs.container-registry-name }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          gcp-region: ${{ inputs.gcp-region }}

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.event.repository.name }}-${{ github.sha }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign sign + attest
        env:
          COSIGN_YES: "true"
          IMAGE_DIGEST: ${{ inputs.image-digest }}
        run: |
          set -eu
          cosign sign --yes "${IMAGE_DIGEST}"
          cosign attest --yes --predicate sbom.json --type cyclonedx "${IMAGE_DIGEST}"

  # ---------------------------------------------------------------------------
  # cosign-verify (promote gate): verify the signature and SBOM attestation
  # against the expected GitHub Actions Sigstore identity.
  # ---------------------------------------------------------------------------
  cosign-verify:
    runs-on: ubuntu-latest
    needs: [cosign-sign]
    steps:
      - name: Cloud registry login
        uses: devdanielgherasim/micro-market-utilities/.github/actions/cloud-registry-login@main
        with:
          cloud-provider: ${{ inputs.cloud-provider }}
          container-registry-name: ${{ inputs.container-registry-name }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          gcp-workload-identity-provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account-email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          gcp-region: ${{ inputs.gcp-region }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - id: identity
        uses: devdanielgherasim/micro-market-utilities/.github/actions/cosign-verify-identity@main
        with:
          workflow-repo: devdanielgherasim/micro-market-utilities
          workflow-file: image-supply-chain.yml

      - name: Verify signature + SBOM attestation
        env:
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          OIDC_ISSUER: ${{ steps.identity.outputs.issuer }}
          OIDC_IDENTITY: ${{ steps.identity.outputs.identity }}
        run: |
          set -eu
          echo "Verifying signature for ${IMAGE_DIGEST}"
          echo "  issuer:   ${OIDC_ISSUER}"
          echo "  identity: ${OIDC_IDENTITY}"
          cosign verify \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --certificate-identity "${OIDC_IDENTITY}" \
            "${IMAGE_DIGEST}"
          echo "Verifying CycloneDX SBOM attestation"
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-oidc-issuer "${OIDC_ISSUER}" \
            --certificate-identity "${OIDC_IDENTITY}" \
            "${IMAGE_DIGEST}" > /dev/null
          echo "cosign verify gate PASSED."

  # ---------------------------------------------------------------------------
  # trigger-deployment-promotion: hands the just-verified image's tag to the
  # `deployment` repo via repository_dispatch, replacing GitLab's former
  # Pipeline Trigger API call. Gated by `trigger-promotion` so a repo can
  # run this entire workflow in shadow mode (no dispatch fired) if needed.
  #
  # Requires a fine-grained PAT scoped to the deployment repo's contents,
  # stored as the DEPLOYMENT_DISPATCH_PAT secret on this repo.
  # ---------------------------------------------------------------------------
  trigger-deployment-promotion:
    runs-on: ubuntu-latest
    needs: [cosign-verify]
    if: ${{ github.ref == 'refs/heads/main' && inputs.trigger-promotion }}
    steps:
      - name: Dispatch promotion event to deployment repo
        env:
          DISPATCH_TOKEN: ${{ secrets.DEPLOYMENT_DISPATCH_PAT }}
          DEPLOYMENT_REPO: ${{ inputs.deployment-repo }}
          PROMOTED_APP_INPUT: ${{ inputs.promoted-app }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          PROMOTED_IMAGE_REPOSITORY: ${{ inputs.image-repository }}
          PROMOTED_IMAGE_TAG: ${{ github.sha }}
        run: |
          set -eu
          : "${DISPATCH_TOKEN:?DEPLOYMENT_DISPATCH_PAT secret is not set. Create a fine-grained PAT scoped to the deployment repo contents and store it as a repo secret of this name.}"
          PROMOTED_APP="${PROMOTED_APP_INPUT:-${REPOSITORY_NAME}}"
          echo "Triggering deployment promotion: app=${PROMOTED_APP} image=${PROMOTED_IMAGE_REPOSITORY}:${PROMOTED_IMAGE_TAG}"
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DEPLOYMENT_REPO}/dispatches" \
            -d "{\"event_type\":\"image-promoted\",\"client_payload\":{\"promoted_app\":\"${PROMOTED_APP}\",\"promoted_image_repository\":\"${PROMOTED_IMAGE_REPOSITORY}\",\"promoted_image_tag\":\"${PROMOTED_IMAGE_TAG}\"}}"
          echo "Triggered."
