# =============================================================================
# frontend.gitlab-ci.yml
# -----------------------------------------------------------------------------
# Top-level CI template for the Next.js frontend (micro-market-frontend).
# The service's own .gitlab-ci.yml includes this via cross-project include:
#
#   include:
#     - project: microservices1691715/utilities
#       ref: main
#       file: ci-templates/frontend.gitlab-ci.yml
#
# It owns the pipeline stage list and pulls in the two shared building blocks:
#   * security-scan-gate  -> SAST + Dependency + Secret scanning, HIGH/CRITICAL gate
#   * image-supply-chain  -> trivy scan, syft SBOM, cosign keyless sign + verify
#
# The frontend's own `lint`/`test` jobs (npm) and `build` job (build.sh, which
# must run `!reference [.export-image-ref, script]` and export the build.env
# dotenv) stay in the consuming repo -- they are only re-homed onto these stage
# names.
# =============================================================================

stages:
  - test      # npm lint + npm test  (+ GitLab SAST/Dependency/Secret analyzers)
  - scan      # report-gate: fail on HIGH/CRITICAL scanner findings
  - build     # build.sh: docker image build + push, export build.env
  - sign      # trivy CRITICAL gate, syft SBOM, cosign keyless sign + attest
  - promote   # cosign verify gate

include:
  - local: ci-templates/security-scan-gate.gitlab-ci.yml
  - local: ci-templates/image-supply-chain.gitlab-ci.yml
