stages:
  - docker-build

variables:
  DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE/maven-docker:latest

docker-build-maven-image:
  stage: docker-build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY"
  script:
    - docker build -t "$DOCKER_IMAGE_TAG" .
    - docker push "$DOCKER_IMAGE_TAG"
  rules:
    - changes:
        - Dockerfile
    - when: manual  # allow you to trigger manually too
  only:
    refs:
      - master