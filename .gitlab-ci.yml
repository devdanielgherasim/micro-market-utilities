include:
  - template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: build

stages:
  - build

variables:
  IMAGE_NAME: "java21-docker-azcli"
  IMAGE_TAG: "$CI_COMMIT_SHA"
  DOCKER_BUILDKIT: "1"

build-and-push-docker-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$ARM_CLIENT_SECRET" | docker login $CONTAINER_REGISTRY_NAME -u "$ARM_CLIENT_ID" --password-stdin
  script:
    - >
      docker build \
        --cache-from "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:$IMAGE_TAG" \
        .
    - docker push "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:$IMAGE_TAG"
    - >
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:$IMAGE_TAG" "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:latest"
        docker push "$CONTAINER_REGISTRY_NAME/$IMAGE_NAME:latest"
      fi
  rules:
    - when: manual
    - allow_failure: false
    - exists:
        - Dockerfile
