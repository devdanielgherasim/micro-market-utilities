stages:
  - build

variables:
  IMAGE_NAME: maven-docker-azure
  IMAGE_TAG: ${CI_COMMIT_SHA}
  DOCKER_BUILDKIT: 1

build-and-push-docker-image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl py3-pip python3
    - apk add --no-cache gcc musl-dev python3-dev libffi-dev openssl-dev cargo make
    - pip3 install --upgrade pip
    - pip3 install azure-cli
    - az login --service-principal --username $ARM_CLIENT_ID --password $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
    - az acr login --name $ACR_NAME
  script:
    - |
      docker build \
        --cache-from ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:${IMAGE_TAG} \
        .
    - docker push ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:${IMAGE_TAG}
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:${IMAGE_TAG} ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:latest
        docker push ${AZURE_REGISTRY_NAME}/${IMAGE_NAME}:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile